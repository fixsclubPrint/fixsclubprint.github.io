<div id="admin-panel">
    <h3>Manual Data Entry - RTPS System</h3>
    
    <label>Profession/पेशा:</label>
    <select id="profession">
        <option value="Student">छात्र / Student</option>
        <option value="Farmer">किसान / Farmer</option>
        <option value="Business">व्यापार / Business</option>
    </select>

    <label>Category/वर्ग:</label>
    <select id="category" onchange="updateCasteOptions()">
        <option value="">Please Select</option>
        <option value="EBC">अत्यंत पिछड़ा वर्ग (अनुसूची-1)</option>
        <option value="BC">पिछड़ा वर्ग (अनुसूची-2)</option>
        <option value="SC">अनुसूचित जाति</option>
        <option value="ST">अनुसूचित जनजाति</option>
        <option value="UR">गैर आरक्षित</option>
    </select>

    <input type="text" id="name" placeholder="Naam (e.g. Santosh Kumar)">
    <input type="text" id="father" placeholder="Pita ka Naam">
    <input type="text" id="address" placeholder="Gram/Mohalla">

    <div id="income-fields">
        <input type="number" id="agri_income" placeholder="Agriculture Income">
        <input type="number" id="other_income" placeholder="Other Sources Income">
    </div>

    <button onclick="generateCertificate()">Generate Original PDF</button>
</div>
